server:
  port: 8080
  forward-headers-strategy: framework

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/${DB_NAME}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD}}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ─── OAuth2 / Google ────────────────────────────────────


# ─── Наши настройки ───────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000  # 24 часа
  vote:
    hash-pepper: ${VOTE_HASH_PEPPER}
  cors:
    allowed-origins: http://localhost:3000
  anthropic:
    api-key: ${ANTHROPIC_API_KEY}  

# ─── Logging ──────────────────────────────────────────────
logging:
  level:
    root: WARN
    com.survey: INFO
    org.springframework.security: WARN